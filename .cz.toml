[tool.commitizen]
name = "cz_customize"
tag_format = "$version"
version_scheme = "semver2"
version = "0.0.1"
major_version_zero = true

[tool.commitizen.customize]
questions = [
  { type = "list", name = "type", message = "Select the type of change you are committing", choices = [
    { value = "feat", name = "feat: A new feature. Correlates with MINOR in SemVer" },
    { value = "fix", name = "fix: A bug fix. Correlates with PATCH in SemVer" },
    { value = "docs", name = "docs: Documentation only changes" },
    { value = "style", name = "style: Changes that do not affect the meaning of the code (white-space, formatting, missing semi-colons, etc)" },
    { value = "refactor", name = "refactor: A code change that neither fixes a bug nor adds a feature" },
    { value = "perf", name = "perf: A code change that improves performance" },
    { value = "test", name = "test: Adding missing or correcting existing tests" },
    { value = "build", name = "build: Changes that affect the build system or external dependencies (example scopes: pip, docker, npm)" },
    { value = "ci", name = "ci: Changes to CI configuration files and scripts (example scopes: GitLabCI)" },
    { value = "chore", name = "chore: Other changes that don't modify src or test files" },
    { value = "revert", name = "revert: Reverts a previous commit" },
  ] },
  { type = "input", name = "scope", message = "What is the scope of this change (e.g. component or file name): (press enter to skip)" },
  { type = "input", name = "subject", message = "Write a short, imperative tense description of the change (max 87 chars):\n" },
  { type = "input", name = "body", message = "Provide a longer description of the change: (press enter to skip)\n" },
  { type = "confirm", name = "breaking", message = "Are there any breaking changes?" },
  { type = "input", name = "issues", message = "Does this change affect any open issues? (press enter to skip)\n" },
]
