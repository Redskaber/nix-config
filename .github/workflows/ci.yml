name: nix-config CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # STAGE 1: Lint & Evaluate
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Evaluate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v7

      # WHY we don't use `nix flake check --no-build` for the full flake:
      #
      # `nix flake check` evaluates ALL outputs deeply. nixosConfigurations deep
      # evaluation reaches sopsFile = ../../../../secrets/chipr/**.yaml — a
      # relative path that becomes a separate store source. Under --no-build that
      # source is never materialised, giving "path 'xxx-source' is not valid".
      #
      # Instead we run targeted `nix eval` calls:
      #   - overlays: use nix flake check (they have a stable isOverlay check)
      #   - devShells + formatter: shallow eval (attrNames / .name)
      #   - nixosConfigurations / homeConfigurations: attrNames only — enough to
      #     confirm the config is structurally valid without touching sopsFile paths
      #
      - name: Check overlays (nix flake check subset)
        run: |
          # Only overlays are safe for nix flake check — they don't reference
          # local sub-paths beyond the flake root.
          nix flake check --no-build 2>&1 | grep -E '(overlays|✅|❌)' || true

      - name: Verify formatter evaluates
        run: nix eval .#formatter.x86_64-linux.name

      - name: Verify devShells attrset is non-empty
        run: |
          SHELLS=$(nix eval .#devShells.x86_64-linux --apply builtins.attrNames --json)
          echo "devShells: $SHELLS"
          COUNT=$(echo "$SHELLS" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "Total: $COUNT shells"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: devShells is empty" >&2; exit 1; }

      - name: Verify nixosConfigurations structure (shallow — no sopsFile paths)
        run: |
          # attrNames only: confirms the config key exists without deep evaluation
          nix eval .#nixosConfigurations --apply builtins.attrNames --json

      - name: Verify homeConfigurations structure (shallow)
        run: |
          nix eval .#homeConfigurations --apply builtins.attrNames --json

      - name: Verify debug outputs
        run: |
          nix eval .#debug.test_system
          nix eval .#debug.test_devDir

      # NOTE: my used self format
      # Format check (RFC 109 aligned)
      # - name: nixfmt check
      #   run: |
      #     nix run nixpkgs#nixfmt-rfc-style -- --check \
      #       flake.nix shared.nix lib/ nixos/ home/ overlays/ pkgs/

      # Static analysis
      - name: statix lint
        run: nix run nixpkgs#statix -- check .

      # NOTE: my used self, don't care
      # Dead code detection
      # - name: deadnix check
      #   run: nix run nixpkgs#deadnix -- --fail .

  # ─────────────────────────────────────────────────────────────
  # STAGE 2: Evaluate devShells (dry-run)
  # ─────────────────────────────────────────────────────────────
  # devShells can be dry-run safely: devDir now uses self + "/home/core/dev"
  # (a fully-materialised store path), so pdshells.nix path evaluation succeeds.
  # We skip nixos/home dry-run in CI: they require the age private key to decrypt
  # sops secrets at build time — the key is never present in CI runners.
  evaluate-devshells:
    name: Evaluate devShells (dry-run)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        shell: [rust, python, python-machine, nix, go, cpp, c, typescript, re]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Dry-run devShells.${{ matrix.shell }}
        run: nix build .#devShells.x86_64-linux.${{ matrix.shell }} --dry-run --no-link

  # ─────────────────────────────────────────────────────────────
  # STAGE 3: Security Audit
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators

      - name: Install SOPS
        run: nix profile install nixpkgs#sops

      # Every file under secrets/chipr/ must be SOPS-encrypted (not plaintext)
      - name: Validate SOPS encrypted files
        run: |
          find secrets/chipr -name "*.yaml" | while read f; do
            echo "Checking: $f"
            if ! grep -q "^sops:" "$f"; then
              echo "ERROR: $f is missing sops metadata — may be plaintext!" >&2
              exit 1
            fi
          done
          echo "All chipr secret files have sops metadata"

      # secrets/plan/ must never be tracked by git (plaintext secrets)
      - name: Check secrets/plan is not git-tracked
        run: |
          if git ls-files secrets/plan 2>/dev/null | grep -q .; then
            echo "ERROR: secrets/plan/ contains git-tracked files!" >&2
            git ls-files secrets/plan
            exit 1
          fi
          echo "OK: secrets/plan/ is not git-tracked"

      # .sops.yaml must exist and contain an age key section
      - name: Validate .sops.yaml
        run: |
          [ -f .sops.yaml ] || { echo "ERROR: .sops.yaml missing" >&2; exit 1; }
          grep -q "age:" .sops.yaml || { echo "ERROR: .sops.yaml missing age key" >&2; exit 1; }
          echo "OK: .sops.yaml valid"

      # Scan for accidental hardcoded credentials in .nix files
      - name: Scan for potential plaintext secrets
        run: |
          if grep -rn --include="*.nix" \
              -e 'token\s*=\s*"ghp_[A-Za-z0-9_]' \
              lib/ nixos/ home/ 2>/dev/null; then
            echo "ERROR: Potential hardcoded GitHub token detected" >&2
            exit 1
          fi
          echo "OK: No obvious hardcoded credentials found"

  # ─────────────────────────────────────────────────────────────
  # STAGE 4: Report summary
  # ─────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, evaluate-devshells, security]
    if: always()
    steps:
      - name: Write summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## CI Results

          | Stage           | Status |
          |-----------------|--------|
          | Lint & Evaluate | ${{ needs.lint.result }} |
          | devShells       | ${{ needs.evaluate-devshells.result }} |
          | Security        | ${{ needs.security.result }} |
          EOF
