name: nix-config CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # STAGE 1: Lint & Evaluate
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Evaluate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v7

      # Nix flake evaluation check (catches type errors, missing attrs)
      - name: nix flake check (evaluate all outputs)
        run: |
          nix flake check --no-build 2>&1 | tee /tmp/flake-check.log
          # Specifically verify key outputs exist
          nix eval .#debug.test_shared --json > /dev/null
          nix eval .#devShells.x86_64-linux --apply builtins.attrNames --json

      # Format check (RFC 109 aligned)
      - name: nixfmt check
        run: |
          nix run nixpkgs#nixfmt-rfc-style -- --check \
            flake.nix shared.nix lib/ nixos/ home/ overlays/ pkgs/

      # Static analysis
      - name: statix lint
        run: nix run nixpkgs#statix -- check .

      # Dead code detection
      - name: deadnix check
        run: nix run nixpkgs#deadnix -- --fail .

  # ─────────────────────────────────────────────────────────────
  # STAGE 2: Build (dry-run + key devShells)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        target:
          - name: nixos-system
            cmd: nix build .#nixosConfigurations.kilig-nixos.config.system.build.toplevel --dry-run --no-link
          - name: home-nixos
            cmd: nix build .#homeConfigurations."kilig@nixos".activationPackage --dry-run --no-link
          - name: devshell-rust
            cmd: nix build .#devShells.x86_64-linux.rust --no-link
          - name: devshell-python
            cmd: nix build .#devShells.x86_64-linux.python --no-link
          - name: devshell-nix
            cmd: nix build .#devShells.x86_64-linux.nix --no-link
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Build ${{ matrix.target.name }}
        run: ${{ matrix.target.cmd }}

  # ─────────────────────────────────────────────────────────────
  # STAGE 3: Security Audit
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators

      - name: Install SOPS
        run: nix profile install nixpkgs#sops

      # Verify all encrypted secret files are valid SOPS format
      - name: Validate SOPS encrypted files
        run: |
          find secrets/chipr -name "*.yaml" | while read f; do
            echo "Checking: $f"
            # Verify file has sops metadata (not plaintext)
            if ! grep -q "sops:" "$f"; then
              echo "ERROR: $f is missing sops metadata — may be plaintext!" >&2
              exit 1
            fi
            # Verify SOPS can parse the file structure
            sops --config /dev/null filestatus "$f" 2>/dev/null || true
          done

      # Ensure plan/ never gets committed
      - name: Check secrets/plan is absent (gitignored)
        run: |
          if git ls-files --error-unmatch secrets/plan 2>/dev/null; then
            echo "ERROR: secrets/plan/ contains tracked files — plaintext secrets in Git!" >&2
            exit 1
          fi
          echo "OK: secrets/plan/ is properly gitignored"

      # Validate .sops.yaml structure
      - name: Validate .sops.yaml
        run: |
          if [ ! -f .sops.yaml ]; then
            echo "ERROR: .sops.yaml missing" >&2
            exit 1
          fi
          # Check it contains age key section
          grep -q "age:" .sops.yaml || { echo "ERROR: .sops.yaml missing age key section" >&2; exit 1; }
          echo "OK: .sops.yaml structure valid"

      # Scan for accidentally hardcoded secrets
      - name: Scan for potential plaintext secrets
        run: |
          # Check no *.nix file contains suspicious patterns
          if grep -rn --include="*.nix" \
            -e "password\s*=\s*\"[a-zA-Z0-9]" \
            -e "token\s*=\s*\"ghp_" \
            lib/ nixos/ home/ 2>/dev/null | grep -v "YOUR_"; then
            echo "WARNING: Potential hardcoded credentials detected above"
          fi

  # ─────────────────────────────────────────────────────────────
  # STAGE 4: Update flake inputs (scheduled / manual)
  # ─────────────────────────────────────────────────────────────
  update-inputs:
    name: Update Flake Inputs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v7

      # Update all inputs except sops-nix (pinned for stability)
      - name: Update flake inputs (except sops-nix)
        run: |
          nix flake update $(nix eval .#api.inputs --json | \
            jq -r 'keys - ["sops-nix"] | join(" ")')

      - name: Commit updated flake.lock
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git diff --cached --quiet || \
            git commit -m "chore: update flake inputs [skip ci]"
          git push

  # ─────────────────────────────────────────────────────────────
  # STAGE 5: Report summary
  # ─────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, build, security]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Stage    | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint     | ${{ needs.lint.result }}     |" >> $GITHUB_STEP_SUMMARY
          echo "| Build    | ${{ needs.build.result }}    |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
