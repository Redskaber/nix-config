name: Nix Configuration CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Validate flake
        run: nix flake check --extra-experimental-features pipe-operators
      - name: Build critical configurations
        run: |
          nix build .#nixosConfigurations.kilig-nixos.config.system.build.toplevel --extra-experimental-features pipe-operators
          nix build .#homeConfigurations.kilig@nixos.activationPackage --extra-experimental-features pipe-operators
          nix build .#homeConfigurations.kilig@linux.activationPackage --extra-experimental-features pipe-operators
          
      - name: Build essential dev shells
        run: |
          nix build .#devShells.x86_64-linux.default  --extra-experimental-features pipe-operators
          nix build .#devShells.x86_64-linux.python --extra-experimental-features pipe-operators
          nix build .#devShells.x86_64-linux.cpp --extra-experimental-features pipe-operators

