name: nix-config CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # STAGE 1: Lint & Evaluate
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Evaluate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v7

      # --no-build skips building derivations but still evaluates all outputs.
      # Catches: missing attrs, type errors, import errors, schema violations.
      # Note: debug.* outputs must NOT contain function-valued attrs (see flake.nix).
      - name: nix flake check (evaluate all outputs, no build)
        run: nix flake check --no-build

      # Verify safe scalar debug outputs exist and are well-formed
      - name: Verify key flake outputs evaluate correctly
        run: |
          nix eval .#debug.test_system
          nix eval .#debug.test_devDir
          # Verify devShells attrset is present (not empty)
          COUNT=$(nix eval .#devShells.x86_64-linux --apply builtins.length \
                    --apply '(s: builtins.length (builtins.attrNames s))' 2>/dev/null || \
                  nix eval .#devShells.x86_64-linux --apply builtins.attrNames --json \
                    | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "devShells count: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: no devShells found" >&2; exit 1; }

      # Format check (RFC 109 aligned)
      - name: nixfmt check
        run: |
          nix run nixpkgs#nixfmt-rfc-style -- --check \
            flake.nix shared.nix lib/ nixos/ home/ overlays/ pkgs/

      # Static analysis
      - name: statix lint
        run: nix run nixpkgs#statix -- check .

      # Dead code detection
      - name: deadnix check
        run: nix run nixpkgs#deadnix -- --fail .

  # ─────────────────────────────────────────────────────────────
  # STAGE 2: Evaluate configurations (dry-run — no actual build)
  # ─────────────────────────────────────────────────────────────
  # Why dry-run for everything:
  #   - nixosConfigurations and homeConfigurations reference secrets/chipr/**
  #     (sopsFile = ...) which are SOPS-encrypted. Building them requires the
  #     age private key which is never present in CI — a full build would fail.
  #   - devShells reference devDir (./home/core/dev) which is a local path.
  #     Nix flake evaluation in CI can produce "path is not valid" errors when
  #     trying to build (not evaluate) such paths in a clean store.
  #   - dry-run resolves the full derivation graph without materialising any
  #     store path, catching attribute errors, missing packages, and schema
  #     violations at near-zero cost.
  evaluate:
    name: Evaluate Configurations (dry-run)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        target:
          - name: nixos-system
            cmd: >
              nix build
              .#nixosConfigurations.kilig-nixos.config.system.build.toplevel
              --dry-run --no-link
          - name: home-nixos
            cmd: >
              nix build
              .#homeConfigurations."kilig@nixos".activationPackage
              --dry-run --no-link
          - name: devshell-rust
            cmd: nix build .#devShells.x86_64-linux.rust --dry-run --no-link
          - name: devshell-python
            cmd: nix build .#devShells.x86_64-linux.python --dry-run --no-link
          - name: devshell-nix
            cmd: nix build .#devShells.x86_64-linux.nix --dry-run --no-link
          - name: devshell-go
            cmd: nix build .#devShells.x86_64-linux.go --dry-run --no-link
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Evaluate ${{ matrix.target.name }} (dry-run)
        run: ${{ matrix.target.cmd }}

  # ─────────────────────────────────────────────────────────────
  # STAGE 3: Security Audit
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators

      - name: Install SOPS
        run: nix profile install nixpkgs#sops

      # Every file under secrets/chipr/ must be SOPS-encrypted (not plaintext)
      - name: Validate SOPS encrypted files
        run: |
          find secrets/chipr -name "*.yaml" | while read f; do
            echo "Checking: $f"
            if ! grep -q "^sops:" "$f"; then
              echo "ERROR: $f is missing sops metadata — may be plaintext!" >&2
              exit 1
            fi
          done
          echo "All chipr secret files have sops metadata"

      # secrets/plan/ must never be tracked by git (plaintext secrets)
      - name: Check secrets/plan is not git-tracked
        run: |
          if git ls-files secrets/plan 2>/dev/null | grep -q .; then
            echo "ERROR: secrets/plan/ contains git-tracked files — plaintext secrets in repo!" >&2
            git ls-files secrets/plan
            exit 1
          fi
          echo "OK: secrets/plan/ is not git-tracked"

      # .sops.yaml must exist and contain an age key section
      - name: Validate .sops.yaml exists and has age section
        run: |
          [ -f .sops.yaml ] || { echo "ERROR: .sops.yaml missing" >&2; exit 1; }
          grep -q "age:" .sops.yaml || { echo "ERROR: .sops.yaml missing age key" >&2; exit 1; }
          echo "OK: .sops.yaml valid"

      # Scan for accidental hardcoded credentials in .nix files
      - name: Scan for potential plaintext secrets in Nix files
        run: |
          FOUND=0
          # Patterns that suggest real credentials (not placeholder strings)
          if grep -rn --include="*.nix" \
              -e 'password\s*=\s*"[a-zA-Z0-9!@#$%^&*]\{8,\}"' \
              -e 'token\s*=\s*"ghp_[A-Za-z0-9_]\+' \
              lib/ nixos/ home/ 2>/dev/null | \
              grep -v 'YOUR_\|example\|placeholder\|FIXME\|TODO'; then
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "WARNING: Potential hardcoded credentials detected above. Please review."
          else
            echo "OK: No obvious hardcoded credentials found"
          fi

  # ─────────────────────────────────────────────────────────────
  # STAGE 4: Report summary
  # ─────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, evaluate, security]
    if: always()
    steps:
      - name: Write summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## CI Results

          | Stage    | Status |
          |----------|--------|
          | Lint     | ${{ needs.lint.result }} |
          | Evaluate | ${{ needs.evaluate.result }} |
          | Security | ${{ needs.security.result }} |
          EOF
