name: Update Flake Inputs

on:
  schedule:
    - cron: "0 3 * * 0" # 每周日 UTC 03:00（北京时间 11:00）
  workflow_dispatch: # 手动触发

concurrency:
  group: update-flake-inputs
  cancel-in-progress: true

jobs:
  update:
    name: Update flake inputs & open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so the PR diff is accurate
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v7

      # Capture current lock state for the PR diff summary
      - name: Snapshot current flake.lock
        run: cp flake.lock flake.lock.before

      - name: Update all flake inputs
        run: nix flake update

      # Generate human-readable diff of what changed
      - name: Generate update summary
        id: summary
        run: |
          if diff -q flake.lock.before flake.lock > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to flake inputs."
          else
            echo "changed=true" >> $GITHUB_OUTPUT

            # Extract changed inputs using nix flake metadata comparison
            BEFORE=$(nix flake metadata --no-update-lock-file --json \
              --override-input nixpkgs nixpkgs 2>/dev/null || echo '{}')

            # Simple diff report
            DIFF=$(diff flake.lock.before flake.lock || true)
            LINES=$(echo "$DIFF" | wc -l)
            echo "Lock changed: $LINES diff lines"

            # Build PR body
            {
              echo "body<<BODY_EOF"
              echo "## Automated flake input update"
              echo ""
              echo "**Triggered by:** ${{ github.event_name }}"
              echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')"
              echo ""
              echo "### What changed"
              echo ""
              echo '```diff'
              diff flake.lock.before flake.lock | head -100 || true
              echo '```'
              echo ""
              echo "### Review checklist"
              echo ""
              echo "- [ ] nixpkgs / nixpkgs-unstable bump reviewed"
              echo "- [ ] home-manager version compatible"
              echo "- [ ] sops-nix version pinning still appropriate"
              echo "- [ ] CI passes on this branch before merging"
              echo ""
              echo "> ⚠️ Review carefully — input updates can introduce breaking changes."
              echo "BODY_EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.summary.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(flake): update flake inputs [skip ci]"
          title: "chore(flake): update flake inputs — ${{ github.run_id }}"
          body: ${{ steps.summary.outputs.body }}
          branch: automation/update-flake-inputs
          delete-branch: true
          labels: |
            dependencies
            automated
          assignees: ${{ github.repository_owner }}

      - name: Skip message (no changes)
        if: steps.summary.outputs.changed == 'false'
        run: echo "All flake inputs are already up to date — no PR created."
